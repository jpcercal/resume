name: Resume

on: [push]

env:
  IMAGE: jpcercal/resume

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Build multi-arch image and push to Docker Hub ────────────────────
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE }}:latest,${{ env.IMAGE }}:${{ github.sha }}

      # ── Run the image to generate artifacts ──────────────────────────────
      - name: Build resume
        run: docker run --rm -v "$PWD:/app" ${{ env.IMAGE }}:${{ github.sha }}

      - uses: actions/upload-artifact@v4
        with:
          name: resume.pdf
          path: resume.pdf

      # ── Commit PDF + preview back to the branch ───────────────────────────
      - name: Commit build artifacts
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add resume.pdf resume-preview.pdf.png resume.html
          git commit --amend --no-edit

      - uses: ad-m/github-push-action@master
        with:
          branch: ${{ github.ref }}
          force_with_lease: true

      # ── Create versioned release (main branch only) ───────────────────────
      - uses: actions/github-script@v7
        if: github.ref == 'refs/heads/main'
        with:
          script: |
            const fs = require('fs').promises;

            const padding = (v) => v < 10 ? `0${v}` : v;

            const date = new Date();
            const year = padding(date.getFullYear());
            const month = padding(date.getMonth());
            const day = padding(date.getDate());
            const hours = padding(date.getHours());
            const minutes = padding(date.getMinutes());
            const seconds = padding(date.getSeconds());

            const major = year - 2023;
            const minor = month;
            const patch = `${day}${hours}${minutes}${seconds}`;

            const releaseName = `${major}.${minor}.${patch}`;

            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${releaseName}`,
              sha: context.sha
            });

            const createReleaseResponse = await github.rest.repos.createRelease({
              draft: false,
              generate_release_notes: true,
              name: releaseName,
              owner: context.repo.owner,
              prerelease: false,
              repo: context.repo.repo,
              tag_name: releaseName,
            });

            await github.rest.repos.uploadReleaseAsset({
              name: 'resume.pdf',
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: createReleaseResponse.data.id,
              data: await fs.readFile('./resume.pdf')
            });

            return releaseName;
