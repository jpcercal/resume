name: Resume

on: [push]

env:
  IMAGE: jpcercal/resume

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # ── Build multi-arch image and push to Docker Hub ────────────────────
      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE }}:latest,${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Run the image to generate artifacts ──────────────────────────────
      # Anonymous volume keeps node_modules inside the container (not on the runner workspace)
      - name: Build resume
        run: docker run --rm -v "$PWD:/app" ${{ env.IMAGE }}:${{ github.sha }}

      - uses: actions/upload-artifact@v7
        with:
          name: resume-artifacts
          retention-days: 7
          path: |
            resume.html
            resume.pdf
            resume-preview.pdf.png
            resume-preview.json.png

      # ── Minify HTML + stage for GitHub Pages ─────────────────────────────
      # NOTE: resume.html is root-owned (written by docker run as root).
      # We read it and write the minified output directly to /tmp/gh-pages/index.html
      # to avoid a permission-denied error when overwriting the root-owned file.
      # TODO: restore `if: github.ref == 'refs/heads/main'` after debugging on PR.
      - name: Minify and stage for GitHub Pages
        run: |
          mkdir -p /tmp/gh-pages
          npx --yes html-minifier-terser --collapse-whitespace --remove-comments --minify-css true --minify-js true -o /tmp/gh-pages/index.html resume.html

      - uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/gh-pages
          publish_branch: gh-pages
          force_orphan: true

      # ── Commit PDF + preview back to the branch ───────────────────────────
      - name: Commit build artifacts
        if: github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f resume.pdf resume-preview.pdf.png resume-preview.json.png
          git add -f resume.html
          git commit --amend --no-edit

      - uses: ad-m/github-push-action@master
        if: github.ref == 'refs/heads/main'
        with:
          branch: ${{ github.ref }}
          force_with_lease: true

      # ── Create versioned release (main branch only) ───────────────────────
      - uses: actions/github-script@v8
        if: github.ref == 'refs/heads/main'
        with:
          script: |
            const fs = require('fs').promises;

            const pad = (v) => v < 10 ? `0${v}` : v;
            const d = new Date();
            const major = d.getFullYear() - 2023;
            const minor = pad(d.getMonth() + 1);
            const patch = `${pad(d.getDate())}${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
            const releaseName = `${major}.${minor}.${patch}`;

            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${releaseName}`,
              sha: context.sha,
            });

            const release = await github.rest.repos.createRelease({
              draft: false,
              generate_release_notes: true,
              name: releaseName,
              owner: context.repo.owner,
              prerelease: false,
              repo: context.repo.repo,
              tag_name: releaseName,
            });

            await github.rest.repos.uploadReleaseAsset({
              name: 'resume.pdf',
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              data: await fs.readFile('./resume.pdf'),
            });

            return releaseName;
