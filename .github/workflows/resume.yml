name: Resume

on: [push]

env:
  IMAGE: jpcercal/resume

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Check formatting
        run: npm run format:check

  build:
    name: build
    needs: format
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # ── Build multi-arch image and push to Docker Hub ────────────────────
      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        if: github.ref == 'refs/heads/main'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Main: multi-arch build + push to Docker Hub ───────────────────
      - uses: docker/build-push-action@v6
        if: github.ref == 'refs/heads/main'
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE }}:latest,${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Non-main: single-arch build, load locally (no push) ──────────
      - uses: docker/build-push-action@v6
        if: github.ref != 'refs/heads/main'
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Run the image to generate artifacts ──────────────────────────────
      # Anonymous volume keeps node_modules inside the container (not on the runner workspace)
      - name: Build resume
        run: docker run --rm -v "$PWD:/app" ${{ env.IMAGE }}:${{ github.sha }}

      - uses: actions/upload-artifact@v7
        with:
          name: resume-artifacts
          retention-days: 7
          path: |
            resume.html
            resume.pdf
            resume.pdf.png
            resume.json.png
            resume.pt-BR.html
            resume.pt-BR.pdf
            resume.pt-BR.pdf.png
            resume.pt-BR.json.png

      # ── Dependency freshness checks (main branch only) ──────────────────
      - name: Check dependency freshness
        if: github.ref == 'refs/heads/main'
        run: |
          echo "── npm audit ──"
          docker run --rm --entrypoint sh ${{ env.IMAGE }}:${{ github.sha }} -c "npm audit --audit-level=moderate" || true
          echo ""
          echo "── npm outdated ──"
          docker run --rm --entrypoint sh ${{ env.IMAGE }}:${{ github.sha }} -c "npm outdated || true"

      # ── Minify HTML + stage for GitHub Pages (main branch only) ─────────
      - name: Minify and stage for GitHub Pages
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p /tmp/gh-pages
          cp resume.html /tmp/gh-pages/index.html
          cp resume.pdf /tmp/gh-pages/resume.pdf
          cp resume.pt-BR.html /tmp/gh-pages/index.pt-BR.html
          cp resume.pt-BR.pdf /tmp/gh-pages/resume.pt-BR.pdf

      - uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/gh-pages
          publish_branch: gh-pages
          force_orphan: true

      # ── Create versioned release (main branch only) ───────────────────────
      - uses: actions/github-script@v8
        if: github.ref == 'refs/heads/main'
        with:
          script: |
            const fs = require('fs').promises;

            const pad = (v) => v < 10 ? `0${v}` : v;
            const d = new Date();
            const major = d.getFullYear() - 2023;
            const minor = pad(d.getMonth() + 1);
            const patch = `${pad(d.getDate())}${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
            const releaseName = `${major}.${minor}.${patch}`;

            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${releaseName}`,
              sha: context.sha,
            });

            const release = await github.rest.repos.createRelease({
              draft: false,
              generate_release_notes: true,
              name: releaseName,
              owner: context.repo.owner,
              prerelease: false,
              repo: context.repo.repo,
              tag_name: releaseName,
            });

            const assets = [
              { name: 'resume.pdf', file: './resume.pdf' },
              { name: 'resume.html', file: './resume.html' },
              { name: 'resume.pt-BR.pdf', file: './resume.pt-BR.pdf' },
              { name: 'resume.pt-BR.html', file: './resume.pt-BR.html' },
              { name: 'resume.pdf.png', file: './resume.pdf.png' },
              { name: 'resume.pt-BR.pdf.png', file: './resume.pt-BR.pdf.png' },
            ];

            for (const asset of assets) {
              await github.rest.repos.uploadReleaseAsset({
                name: asset.name,
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.data.id,
                data: await fs.readFile(asset.file),
              });
            }

            return releaseName;
